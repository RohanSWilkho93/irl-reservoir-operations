# =============================================================================
# Reservoir Configuration: Dexter
# =============================================================================
# Operational Target : Run-of-River
# Operating Purposes : Hydroelectric, Recreation
# Record Period      : 18 years
# =============================================================================

# --------------------------------------------------------------------------
# CLI-configurable settings
# Pass these flags on first run — values are written back here for reproducibility.
#   --data_path          /path/to/data.csv
#   --state_variables    col1 col2 ...
#   --use_month_encoding true|false
#   --split_train        <int>
#   --split_val          <int>
#   --split_test         <int>
# --------------------------------------------------------------------------

data_path: data/dexter.csv

columns:
  date: date
  state:
  - storage
  - net_inflow
  action: release
  use_month_encoding: true
  storage: storage
  inflow: net_inflow

# Train / validation / test split (in years, chronological order).
split:
  train: 14
  val: 1
  test: 3

# Normalization bounds — auto-computed from the training split on first run
# and written back here. Applied unchanged to val and test.
reservoir:
  # bounds: written automatically by data.py from the training split on first run — do not pre-fill
  mass_balance:
    seconds_per_day: 86400
    volume_factor: 1.0e+6
    max_storage:             # null -> bounds.storage.max
    min_storage:             # null -> bounds.storage.min
    max_release:             # null -> bounds.release.max
    min_release:             # null -> bounds.release.min

  bounds: {}

# DeepMaxEnt discretization search bounds.
# Step sizes define the resolution of the state-action grid.
# Scale to match the magnitude of your reservoir's storage and flows.
deepmaxent:
  storage_step: [1.0, 2.0, 5.0, 10.0, 15.0]
  release_step: [5.0, 10.0, 15.0, 20.0, 25.0]
  inflow_step:  [5.0, 10.0, 15.0, 20.0, 25.0]
  reward_features: []

