# =============================================================================
# Deep MaxEnt IRL configuration  (single stage: tune -> retrain best -> results)
# =============================================================================
# Discretized-grid Maximum-Entropy IRL: a reward network over
# [storage, release, sin(month), cos(month), inflow] is trained by matching
# expert vs policy state-visitation frequencies (grad = mu_E - mu_L), with the
# policy obtained by entropy-regularized soft value iteration on a gridded MDP.
#
# Optuna maximises the VALIDATION unified score:
#   0.50*(1 - SVF_diff_norm) + 0.125*release_corr + 0.125*storage_corr
#                            + 0.125*(1 - release_nRMSE) + 0.125*(1 - storage_nRMSE)
#
# List values            -> Optuna samples categorically
# Dict {low, high, log}  -> continuous range  (optional `step` for grid sampling)
# =============================================================================

deepmaxent:

  runtime:
    device: cpu                 # auto | cpu | cuda  (value iteration is CPU/numpy; only the reward net uses the device)
    num_workers: 4              # parallel Optuna workers

  optuna:
    n_trials: 500               # Deep MaxEnt trials are heavy (each builds the transition matrix + value iteration)
    n_jobs: 4                   # fallback workers if runtime.num_workers is null

  # Guard: each trial's transition matrix P is dense (n_states, 12, n_releases,
  # n_states); n_states = n_storage * n_inflow.  Skip (prune) grids beyond this.
  guards:
    max_states: 5000               # prune trials with n_states = n_storage*n_inflow above this
    max_transition_elems: 2.0e8    # prune trials whose dense P (n_states*12*n_release*n_states) is bigger (~0.8 GB)

  tuning:
    n_mc_simulations: 30        # reduced MC during the search (faster trials)
    final_n_mc_simulations: 50  # full MC when retraining + scoring the winner

  search_space:
    seed: [42, 123, 456, 789, 1024, 2048]

    # discretization steps (engineering units) — the main grid-size driver
    storage_step: [5.0, 10.0]
    release_step: [10.0, 25.0, 50.0]
    inflow_step: [10.0, 25.0, 50.0]

    # MDP
    gamma: [0.90, 0.95, 0.99]
    tau: {low: 0.01, high: 1.0, log: true}

    # reward network
    hidden_dim1: [64, 128, 256, 512]
    hidden_dim2: [64, 128, 256, 512]
    dropout: {low: 0.0, high: 0.4, step: 0.1}

    # training
    lr: {low: 1.0e-5, high: 1.0e-3, log: true}
    n_iterations: [100, 200, 300, 400, 500]
    batch_size: [1000, 2000, 5000]
    val_early_stop_patience: [50, 75, 100, 150]
