# =============================================================================
# IQ-Learn configuration  (Behavioral Cloning  ->  IQ-Learn)
# =============================================================================
# The policy family is NOT chosen by the user.  Behavioral Cloning inspects the
# expert release record and tunes the matching candidate pair, then keeps the
# better policy (see bc_tuning.run_bc_tuning + distributions.detect_family_pair):
#
#     release has zero days  ->  HardGating, SoftGating   (zero-inflated)
#     release is continuous  ->  Beta,       LogNormal    (continuous)
#
# List values            -> Optuna samples categorically
# Dict {low, high, log}  -> Optuna samples from a continuous range
# =============================================================================

bc_tuning:

  runtime:
    device: cpu                         # auto | cpu | cuda | cuda:N | mps
    num_workers: 1                      # parallel Optuna workers (per family)

  optuna:
    n_trials: 2                         # trials PER candidate family (two families per run)
    n_jobs: 10                          # fallback workers if runtime.num_workers is null

  # Data-driven family selection (the Paper-1 pairing, enforced automatically).
  selection:
    zero_frac_threshold: 0.01           # >1% of (near-)zero release days -> zero-inflated pair
    zero_release_eps:                   # release <= eps counts as zero; null -> max(1e-6, 1e-4*max)

  # ---- shared backbone (all four families) ----
  shared:
    seed: [42, 123, 456, 789, 1024, 2048, 3407]
    hidden_dim: [64, 128, 256, 512]
    n_hidden_layers: [2, 3, 4, 5]
    dropout: [0.0, 0.1, 0.2, 0.3]
    lr: {low: 0.0001, high: 0.005, log: true}
    epochs: [200, 250, 300, 350, 400, 450, 500]
    batch_size: [64, 128, 256, 512]
    scheduler_type: [cosine, plateau, none]
    early_stopping_patience: [15, 30, 50]

  # ---- continuous families (no zero days) ----
  beta:
    alpha_max: [10, 20, 50, 100]        # upper clamp on Beta alpha (min fixed at 1)
    beta_max: [10, 20, 50, 100]         # upper clamp on Beta beta  (min fixed at 1)
  lognormal:
    sigma_min: {low: 0.01, high: 0.5, log: true}      # log-space std floor
    log_epsilon: {low: 0.1, high: 10.0, log: true}    # offset in log(release + eps)

  # ---- zero-inflated families (zero days present) ----
  hardgating:
    zero_threshold: [0.005, 0.01, 0.015, 0.02]        # release below this is "no release"
  softgating:
    zero_threshold: [0.005, 0.01, 0.02]


iq_tuning:

  runtime:
    device: cpu
    num_workers: 1

  optuna:
    n_trials: 2
    n_jobs: 10

  # Actor architecture + distribution family are INHERITED from bc_best_config.json
  # (warm-started from bc_policy.pt). They are NOT searched here.

  training:
    batch_size: [64, 128, 256, 512]
    critic_warm_up_epochs: [50, 100, 150, 200]
    n_epochs: [200, 250, 300, 350, 400]
    warmup_patience: [15, 30, 50]
    joint_patience: [15, 30, 50]
    scheduler_type: [cosine, plateau, none]

  # Critic is trained from scratch -> architecture is tunable
  critic:
    hidden_dim: [64, 128, 256, 512]
    n_hidden_layers: [2, 3, 4, 5]

  # IQ-Learn hyperparameters
  iqlearn:
    lr_actor: {low: 1.0e-5, high: 1.0e-3, log: true}
    lr_critic: {low: 1.0e-5, high: 1.0e-3, log: true}
    gamma: [0.90, 0.95, 0.99]
    tau: {low: 0.001, high: 0.01, log: true}
    alpha_entropy: {low: 0.01, high: 1.0, log: true}
    alpha_reg: {low: 0.01, high: 1.0, log: true}
    lambda_bc: {low: 0.0, high: 1.0, log: false}

  early_stopping:
    min_delta: 0.0

  # Composite score (mostly env-free; the rollout slice scores closed-loop fidelity)
  scoring:
    expert_advantage: 0.40      # reward quality — expert Q above random
    q_smoothness: 0.25          # reward quality — temporal Q smoothness
    prediction_fidelity: 0.20   # rollout: storage + release r/nRMSE via mass balance
    entropy: 0.075              # robustness — policy not collapsed / exploded
    action_diversity: 0.075     # robustness — actions vary across states
