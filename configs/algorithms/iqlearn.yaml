# =============================================================================
# IQLearn Configuration
# =============================================================================
# CLI flags accepted by all algorithm scripts:
#   --device, --num_workers, --n_trials, --n_jobs, --seed,
#   --hidden_dim, --n_hidden_layers, --dropout,
#   --lr, --epochs, --batch_size, --scheduler_type, --early_stopping_patience,
#   --n_bins, --binning, --ordinal_smoothing
# =============================================================================
# Behavioral Cloning uses a SINGLE non-parametric head:
# a quantile-binned categorical distribution over normalised release.
#
# Skew, bounded support, zero-inflation, and multimodality are all
# captured by the predicted per-state histogramer. 
# The bin edges and empirical bin means are computed once from
# pooled training releases, frozen, and serialised into best_config.json so the
# file remains self-contained.
#
# List values            -> Optuna samples categorically
# Dict {low, high, log}  -> Optuna samples from a continuous range
# =============================================================================

bc_tuning: ### Hyperparameters for Bheavioral Cloning Tuning

    # -------------------------------------------------------------------------
    # Runtime
    # -------------------------------------------------------------------------
  runtime:
    device: cuda                                               # cuda | cpu
    num_workers: 2                                            # dataloader workers

    # -------------------------------------------------------------------------
    # Optuna
    # -------------------------------------------------------------------------
  optuna:
    n_trials: 5                                              # number of Optuna trials
    n_jobs: 10                                               # parallel Optuna workers (nodes)

    # -------------------------------------------------------------------------
    # Shared backbone
    # The state -> output MLP is unchanged by going categorical; only the final
    # output layer differs (K logits instead of distribution parameters).
    # -------------------------------------------------------------------------
  shared:
    seed: [42, 123, 456, 789, 1024, 2048, 3407]              # random seeds for repeated evaluation

      # --- Policy network architecture ---
    hidden_dim: [64, 128, 256, 512]                          # hidden-layer width
    n_hidden_layers: [2, 3, 4, 5]                            # depth of the policy MLP
    dropout: [0.0, 0.1, 0.2, 0.3]                            # dropout probability

      # --- Optimization ---
    lr: {low: 0.0001, high: 0.005, log: true}                # learning rate (log-uniform)
    epochs: [200, 250, 300, 350, 400, 450, 500]              # maximum training epochs
    batch_size: [64, 128, 256, 512]                          # mini-batch size
    scheduler_type: [cosine, plateau, none]                  # LR scheduler
    early_stopping_patience: [15, 30, 50]                    # epochs w/o improvement before stop

    # -------------------------------------------------------------------------
    # Categorical (quantile-binned) policy
    # Replaces all four former family blocks.
    # -------------------------------------------------------------------------
  categorical:
    n_bins: [20, 30, 50, 75, 100]                            # K: grid resolution (output-layer width)
    binning: [quantile, log]                                 # edge placement on the normalised release axis
    ordinal_smoothing: [0.0, 0.5, 1.0, 1.5]                  # Gaussian soft-label width in BIN UNITS


iq_tuning:

  runtime:
    device: cuda
    num_workers: 2

  optuna:
    n_trials: 5
    n_jobs: 10

  # Actor architecture + bin grid are INHERITED from bc_best_config.json
  # (warm-started from bc_policy.pt). They are NOT searched here.

  training:
    batch_size: [64, 128, 256, 512]
    critic_warm_up_epochs: [50, 100, 150, 200]
    n_epochs: [200, 250, 300, 350, 400]
    warmup_patience: [15, 30, 50]                       # warm-up epochs w/o composite gain -> stop
    joint_patience: [15, 30, 50]                       # joint   epochs w/o composite gain -> stop
    scheduler_type: [cosine, plateau, none]                # one type, applied to critic (warm-up),

  # Critic is trained from scratch -> architecture is tunable
  critic:
    hidden_dim: [64, 128, 256, 512]
    n_hidden_layers: [2, 3, 4, 5]

  # IQ-Learn hyperparameters
  iqlearn:
    lr_actor: {low: 1.0e-5, high: 1.0e-3, log: true}
    lr_critic: {low: 1.0e-5, high: 1.0e-3, log: true}
    gamma: [0.90, 0.95, 0.99]
    tau: {low: 0.001, high: 0.01, log: true}
    alpha_entropy: {low: 0.01, high: 1.0, log: true}
    alpha_reg: {low: 0.01, high: 1.0, log: true}
    lambda_bc: {low: 0.0, high: 1.0, log: false}
  # -------------------------------------------------------------------------
  # Early stopping (fixed; patiences themselves are tuned above)
  # -------------------------------------------------------------------------
  early_stopping:
    min_delta: 0.0                                         # composite gain must exceed this to count
   # Composite score (mostly env-free; rollout slice optional)
  scoring:
    expert_advantage: 0.40    # reward quality — expert Q above random
    q_smoothness: 0.25        # reward quality — temporal Q smoothness
    prediction_fidelity: 0.20   # rollout: storage + release r/rmse via mass balance
    entropy: 0.075            # robustness — policy not collapsed / exploded
    action_diversity: 0.075   # robustness — actions vary across states


# =============================================================================
