# =============================================================================
# AIRL configuration  (BC tuning -> discriminator warm-up + joint PPO tuning)
# =============================================================================
# Stage 1 (bc_tuning) is AIRL's own BC tuner — identical structure to
# iqlearn.yaml's bc_tuning: data-driven family pair, tune both, keep the winner.
# Stage 2 (airl_tuning) warm-starts the actor from bc_policy.pt and tunes the
# AIRL discriminator + PPO. Optuna maximises the validation composite:
#   0.50*disc_balance + 0.125*release_corr + 0.125*(1-release_nRMSE)
#                     + 0.125*storage_corr + 0.125*(1-storage_nRMSE)
# =============================================================================

bc_tuning:

  runtime:
    device: cpu
    num_workers: 6

  optuna:
    n_trials: 1000                      # trials PER candidate family (two families per run)
    n_jobs: 10

  selection:
    zero_frac_threshold: 0.01
    zero_release_eps:                   # null -> max(1e-6, 1e-4*max)

  shared:
    seed: [42, 123, 456, 789, 1024, 2048, 3407]
    hidden_dim: [64, 128, 256, 512]
    n_hidden_layers: [2, 3, 4, 5]
    dropout: [0.0, 0.1, 0.2, 0.3]
    lr: {low: 0.0001, high: 0.005, log: true}
    epochs: [200, 250, 300, 350, 400, 450, 500]
    batch_size: [64, 128, 256, 512]
    scheduler_type: [cosine, plateau, none]
    early_stopping_patience: [15, 30, 50]

  beta:
    alpha_max: [10, 20, 50, 100]
    beta_max:  [10, 20, 50, 100]
  lognormal:
    sigma_min:   {low: 0.01, high: 0.5,  log: true}
    log_epsilon: {low: 0.1,  high: 10.0, log: true}
  hardgating:
    zero_threshold: [0.005, 0.01, 0.015, 0.02]
  softgating:
    zero_threshold: [0.005, 0.01, 0.02]


airl_tuning:

  runtime:
    device: cpu
    num_workers: 4

  optuna:
    n_trials: 100                       # AIRL trials are heavy (BC warm-start + adversarial PPO, 5 networks)
    n_jobs: 4

  # Actor architecture + distribution family are INHERITED from bc_policy.pt.
  search_space:
    # value critic + discriminator architectures
    critic_hidden_dim: [128, 256, 512]
    critic_n_hidden_layers: [2, 3, 4]
    disc_hidden_dim: [128, 256, 512]
    disc_n_hidden_layers: [2, 3, 4]

    # learning rates
    lr_policy:        {low: 1.0e-6, high: 1.0e-3, log: true}
    lr_critic:        {low: 1.0e-5, high: 1.0e-2, log: true}
    lr_discriminator: {low: 1.0e-5, high: 1.0e-3, log: true}

    # discriminator training
    disc_updates: [1, 3, 5, 8, 12, 15]
    warmup_disc_updates: [5, 10, 15]
    gradient_penalty_coef:   {low: 1.0, high: 20.0}
    label_smoothing_epsilon: {low: 0.0, high: 0.15}

    # PPO
    gamma: [0.95, 0.99, 0.999]
    gae_lambda:   {low: 0.9, high: 0.99}
    clip_epsilon: {low: 0.1, high: 0.3}
    entropy_coef: {low: 0.001, high: 0.1, log: true}
    ppo_epochs: [3, 5, 8, 10]
    kl_regularization_coef: {low: 0.0, high: 2.0}

    # schedule
    warmup_iterations: [30, 50, 75, 100]
    num_iterations: [200, 300, 400]
    steps_per_iteration: [1024, 2048, 4096]
    batch_size: [256, 512, 1024]
    early_stopping_patience: [30, 50, 75]
