# =============================================================================
# Algorithm Configuration: Adversarial Inverse Reinforcement Learning (AIRL)
# =============================================================================
# Controls Optuna hyperparameter search for airl/tune.py.
#
# The policy network architecture and weights are fixed from the best BC
# configuration (results/<reservoir>/behavioral_cloning/best_config.json).
# Only AIRL-specific components are tuned here: the critic (value function),
# the discriminator (reward network + shaping function), and the PPO
# training schedule.
# =============================================================================

# --------------------------------------------------------------------------
# Runtime settings
# Set via CLI on first run — values are written back here for reproducibility.
#
# CLI flags:
#   --device      <value>   compute device
#   --num_workers <value>   parallel Optuna workers (overrides optuna.n_jobs)
#
# device options:
#   auto          use GPU if available, otherwise CPU (recommended default)
#   cpu           CPU only — use on login nodes or CPU-only allocations
#   cuda          default GPU (first available)
#   cuda:0/1/...  specific GPU by index
#   mps           Apple Silicon GPU
#
# num_workers (HPC / SLURM):
#   AIRL rollouts are expensive — match to available GPU workers or CPU cores.
#   Set to --cpus-per-task (CPU) or number of GPUs for parallel trials.
#   Example:  #SBATCH --cpus-per-task=10  →  num_workers: 10
#   null means fall back to optuna.n_jobs below.
# --------------------------------------------------------------------------
runtime:
  device: cpu
  num_workers: 1     # null: falls back to optuna.n_jobs

# --------------------------------------------------------------------------
# Optuna study settings
# AIRL tuning involves environment rollouts and is significantly slower than
# BC tuning. Start with fewer trials if compute time is limited.
# n_jobs: used only when runtime.num_workers is null.
# --------------------------------------------------------------------------
optuna:
  n_trials: 2
  n_jobs: 10

# --------------------------------------------------------------------------
# Hyperparameter search space
# Each entry maps to one Optuna suggest call in airl/tune.py.
#
# Format:
#   param: [a, b, c]                      → suggest_categorical
#   param: {low: x, high: y}              → suggest_float (uniform)
#   param: {low: x, high: y, log: true}   → suggest_float (log-uniform)
#   param: {low: x, high: y, type: int}   → suggest_int
# --------------------------------------------------------------------------
search_space:

  # Critic network (value function — trained from scratch)
  critic_hidden_dim: [64, 128, 256, 512]
  critic_n_hidden_layers: {low: 2, high: 4, type: int}

  # Discriminator network (reward + shaping — trained from scratch)
  disc_hidden_dim: [64, 128, 256, 512]
  disc_n_hidden_layers: {low: 2, high: 4, type: int}
  disc_dropout: {low: 0.0, high: 0.5}            # shared by reward net and shaping net

  # Learning rates
  # lr_policy:        policy network (initialized from BC — use a small LR)
  # lr_critic:        value function
  # lr_discriminator: AIRL discriminator
  lr_policy: {low: 1.0e-6, high: 1.0e-3, log: true}
  lr_critic: {low: 1.0e-5, high: 1.0e-2, log: true}
  lr_discriminator: {low: 1.0e-5, high: 1.0e-3, log: true}

  # Discriminator training
  # disc_updates:           gradient steps per iteration (more = slower but stabler)
  # warmup_disc_updates:    steps used during the warm-up phase only
  # gradient_penalty_coef:  WGAN-GP penalty weight (stabilizes discriminator training)
  # label_smoothing_epsilon: soft labels for expert (1-ε) and policy (ε) targets
  disc_updates: {low: 1, high: 15, type: int}
  warmup_disc_updates: [5, 10, 15]
  gradient_penalty_coef: {low: 1.0, high: 20.0}
  label_smoothing_epsilon: {low: 0.0, high: 0.15}

  # PPO parameters
  # gamma:       discount factor
  # gae_lambda:  GAE bias-variance tradeoff (higher = lower bias, higher variance)
  # clip_epsilon: PPO clipping range
  # entropy_coef: entropy bonus weight (encourages exploration)
  # ppo_epochs:  gradient steps per rollout batch
  gamma: [0.95, 0.99, 0.999]
  gae_lambda: {low: 0.90, high: 0.99}
  clip_epsilon: {low: 0.1, high: 0.3}
  entropy_coef: {low: 0.001, high: 0.1, log: true}
  ppo_epochs: {low: 3, high: 10, type: int}

  # KL regularization
  # Penalizes divergence between the current policy and the BC prior.
  # 0.0 = no regularization; higher values anchor the policy closer to BC.
  kl_regularization_coef: {low: 0.0, high: 2.0}

  # Training schedule
  # warmup_iterations:   iterations of discriminator-only training before joint update
  # num_iterations:      total training iterations
  # steps_per_iteration: environment steps collected per iteration (rollout size)
  # batch_size:          minibatch size for discriminator and PPO updates
  warmup_iterations: [25, 50, 75, 100]
  num_iterations: [200, 300, 400, 500]
  steps_per_iteration: [1024, 2048, 4096]
  batch_size: [256, 512, 1024]

  # Early stopping patience (iterations without validation improvement)
  early_stopping_patience: [25, 50, 75, 100]
